<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Leaderboard Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text: #1e293b;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --radius: 12px;
        --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }

      .navbar {
        background: var(--card-bg);
        border-bottom: 1px solid var(--border);
        padding: 1rem 2rem;
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .navbar h1 {
        margin: 0;
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--primary);
      }

      .container {
        max-width: 1100px;
        margin: 2rem auto;
        padding: 0 1rem;
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 2rem;
      }

      @media (max-width: 900px) {
        .container { 
          grid-template-columns: 1fr; 
          margin-top: 1rem;
          gap: 1.5rem;
        }
        aside { order: 2; }
        main { order: 1; }
        .navbar { padding: 1rem; }
      }

      @media (max-width: 600px) {
        .player-header {
          flex-direction: column;
          align-items: flex-start;
          gap: 0.25rem;
        }
        .stats-grid {
          grid-template-columns: 1fr;
        }
        .card { padding: 1rem; }
      }

      aside {
        display: flex;
        flex-direction: column;
      }

      .card {
        background: var(--card-bg);
        border-radius: var(--radius);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }

      .card-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .input-group {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      input[type="text"] {
        flex: 1;
        padding: 0.625rem 0.875rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.2s;
      }

      input[type="text"]:focus {
        border-color: var(--primary);
      }

      button {
        padding: 0.625rem 1rem;
        font-size: 0.875rem;
        font-weight: 500;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        background: var(--primary);
        color: white;
      }

      button:hover { background: var(--primary-hover); }
      button.secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
      button.secondary:hover { background: var(--border); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }

      th {
        text-align: left;
        padding: 0.75rem;
        border-bottom: 2px solid var(--border);
        color: var(--text-muted);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.75rem;
      }

      td {
        padding: 0.75rem;
        border-bottom: 1px solid var(--border);
      }

      tr.clickable { cursor: pointer; }
      tr.clickable:hover { background: var(--bg); }

      .badge {
        padding: 0.25rem 0.5rem;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 600;
        background: #dcfce7;
        color: #166534;
      }

      #chartContainer {
        min-height: 400px;
        position: relative;
      }

      .top-gainers-wrapper {
        max-height: 575px;
        overflow-y: auto;
        margin: 0 -1.5rem;
        padding: 0 1.5rem;
      }

      @media (max-width: 900px) {
        .top-gainers-wrapper {
          max-height: 400px;
        }
        #topGainersCard {
          position: static !important;
        }
      }

      /* Hide horizontal scroll if any */
      .top-gainers-wrapper {
        overflow-x: hidden;
      }

      .error-state {
        display: none;
        padding: 3rem 1.5rem;
        text-align: center;
        background: #fef2f2;
        border-radius: var(--radius);
        border: 1px solid #fecaca;
        color: #991b1b;
        margin-top: 1rem;
      }

      .error-state h3 { margin-top: 0; }
      .error-state button { margin-top: 1rem; }

      .player-header {
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }

      .player-name { font-size: 1.5rem; font-weight: 700; }
      .player-uuid { font-family: monospace; color: var(--text-muted); font-size: 0.875rem; }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .stat-card {
        padding: 1rem;
        background: var(--bg);
        border-radius: 8px;
      }

      .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
      .stat-value { font-size: 1.25rem; font-weight: 700; }

      .loading-overlay {
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 5;
        display: none;
      }

      code {
        background: var(--bg);
        padding: 0.2rem 0.4rem;
        border-radius: 4px;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <h1>Leaderboard Tracker</h1>
      <div style="display: flex; align-items: center; gap: 1rem;">
        <select id="gameSelector" style="padding: 0.4rem; border-radius: 6px; border: 1px solid var(--border); font-size: 0.875rem;">
          <option value="">All Games</option>
        </select>
      </div>
    </nav>

    <div class="container">
      <aside>
        <div class="card" id="topGainersCard" style="position: sticky; top: 5rem;">
          <div class="card-title">
            <span>Top Gainers</span>
            <select id="daysSelector" style="padding: 0.25rem; border-radius: 4px; border: 1px solid var(--border); font-size: 0.75rem; color: var(--text-muted);">
              <option value="7">Last 7 Days</option>
              <option value="30" selected>Last 30 Days</option>
            </select>
          </div>
          <div id="topGainersContainer" class="top-gainers-wrapper">
            <div id="topGainers" class="text-muted">Loading...</div>
          </div>
        </div>
      </aside>

      <main>
        <div class="card">
          <div class="card-title">Player Search</div>
          <div class="input-group">
            <input id="playerSearch" type="text" placeholder="Enter Player IGN or UUID..." />
            <button id="loadPlayerBtn">View Stats</button>
          </div>
          
          <div id="playerProfile" style="display: none;">
            <div class="player-header">
              <span id="displayIgn" class="player-name">---</span>
              <span id="displayUuid" class="player-uuid">---</span>
            </div>

            <div class="stats-grid">
              <div class="stat-card">
                <div id="gainLabel" class="stat-label">Score Gain</div>
                <div id="displayGain" class="stat-value">0</div>
              </div>
              <div class="stat-card">
                <div id="scoreLabel" class="stat-label">Current Score</div>
                <div id="displayCurrentScore" class="stat-value">---</div>
              </div>
            </div>

            <div id="chartWrapper" style="position: relative;">
              <div id="chartLoading" class="loading-overlay">Loading chart...</div>
              <div id="chartContainer">
                <canvas id="scoreChart"></canvas>
              </div>
            </div>
          </div>

          <div id="errorState" class="error-state">
            <h3 id="errorTitle">Player Not Found</h3>
            <p id="errorMessage">We couldn't find any data for the requested player.</p>
          </div>
          
          <div id="emptyState" class="text-muted" style="text-align: center; padding: 3rem 0;">
            Select a player from the list or enter a UUID to see details.
          </div>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
